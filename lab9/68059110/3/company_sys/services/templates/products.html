{% extends 'base.html' %}
{% block title %}Products{% endblock %}

{% block content %}
<h2 class="text-center text-white mb-4">🛍️ Our Products</h2>

<div class="row g-4">
{% for i in "123456" %}
<div class="col-md-4">
    <div class="card product-card h-100">
        <img src="https://picsum.photos/400/300?{{i}}" class="card-img-top">
        <div class="card-body text-center">
            <h5 class="card-title text-primary">สินค้า {{i}}</h5>
            <p class="card-text">ราคา {{i}}00 บาท</p>
            <button class="btn btn-outline-primary">ซื้อเลย</button>
        </div>
    </div>
</div>
{% endfor %}
</div>

<style>
.product-card{
    border-radius:20px;
    overflow:hidden;
    transition:.4s;
    box-shadow:0 10px 25px rgba(0,0,0,.3);
}
.product-card:hover{
    transform:translateY(-12px) scale(1.05) rotate(1deg);
    box-shadow:0 20px 40px rgba(0,0,0,.5);
}
</style>
{% endblock %}
