<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>{% block title %}CompanySys{% endblock %}</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    background:linear-gradient(135deg,#667eea,#764ba2);
    font-family:"Segoe UI",sans-serif;
}
main{ flex:1; }

/* Glass Navbar */
.navbar{
    background:rgba(255,255,255,0.15) !important;
    backdrop-filter: blur(10px);
    box-shadow:0 4px 20px rgba(0,0,0,.3);
}
.nav-link{
    font-weight:bold;
    transition:.3s;
}
.nav-link:hover{
    color:#ffd700 !important;
    transform:scale(1.1);
}

/* Footer */
footer{
    background:rgba(0,0,0,.4);
    color:white;
    text-align:center;
    padding:12px;
}

/* Fade animation */
.fade-in{
    animation:fade 1s ease;
}
@keyframes fade{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark">
<div class="container">
<a class="navbar-brand fw-bold" href="/">✨ CompanySys</a>
<div>
<a class="nav-link d-inline text-white" href="/">หน้าแรก</a>
<a class="nav-link d-inline text-white" href="/products/">สินค้า</a>
<a class="nav-link d-inline text-white" href="/feedback/">ข้อเสนอแนะ</a>
</div>
</div>
</nav>

<main class="container mt-4 fade-in">
{% block content %}{% endblock %}
</main>

<footer>
© 2026 CompanySys | Mathurada PHayungton 68059110 ❤️
</footer>

</body>
</html>
