<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Feedback Form</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="form-box">
    <h3>📢 ฟอร์มข้อเสนอแนะ</h3>

    <form>
        <label>พิมพ์ข้อเสนอแนะหรือข้อร้องเรียน</label>
        <textarea id="feedback" maxlength="100" placeholder="พิมพ์ข้อความที่นี่... (ไม่เกิน 100 ตัวอักษร)"></textarea>

        <div class="counter">
            จำนวนตัวอักษร: <span id="charCount">0</span> / 100
        </div>

        <div class="progress">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <button type="submit">ส่งข้อมูล</button>
    </form>
</div>

<script src="script.js"></script>
</body>
</html>
