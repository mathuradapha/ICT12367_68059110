<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>เพิ่มข้อมูลประชากร</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background:linear-gradient(135deg,#4facfe,#00f2fe); min-height:100vh; font-family:'Segoe UI',sans-serif; }
        .form-container { display:flex; justify-content:center; align-items:center; height: 80vh; }
        .form-box { width:420px; background:white; padding:30px; border-radius:15px; box-shadow:0 10px 30px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">eiei</a>
        <div class="navbar-nav">
            <a class="nav-link" href="/">หน้าแรก</a>
            <a class="nav-link active" href="/form/">เพิ่มข้อมูล</a>
        </div>
    </div>
</nav>

<div class="form-container">
    <div class="form-box">
        <h2 class="text-center mb-4">📋 เพิ่มข้อมูล</h2>
        <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
                <label>รหัสประชากร</label>
                <input type="text" name="citizen_id" class="form-control" required>
            </div>
            <div class="mb-3">
                <label>ชื่อจริง</label>
                <input type="text" name="name" class="form-control" required>
            </div>
            <div class="mb-3">
                <label>ชื่อเล่น</label>
                <input type="text" name="nickname" class="form-control">
            </div>
            <div class="mb-3">
                <label>อายุ</label>
                <input type="number" name="age" class="form-control" required>
            </div>
            <div class="d-grid">
                <button class="btn btn-primary">💾 บันทึกข้อมูล</button>
            </div>
        </form>
    </div>
</div>

</body>
</html>
