<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ข้อมูลประชากร</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background:#f4f6f9; font-family:'Segoe UI',sans-serif; }
        .container { margin-top:30px; }
        .card { border-radius:15px; box-shadow:0 8px 20px rgba(0,0,0,0.1); }
        .banner { height:200px; background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url("https://images.unsplash.com/photo-1508780709619-79562169bc64"); background-size:cover; background-position:center; display:flex; align-items:center; justify-content:center; color:white; text-align:center; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">eiei</a>
        <div class="navbar-nav">
            <a class="nav-link active" href="/">หน้าแรก</a>
            <a class="nav-link" href="/form/">เพิ่มข้อมูล</a>
        </div>
    </div>
</nav>

<div class="banner">
    <div>
        <h1>ระบบทะเบียนประชากร</h1>
        <p>รายวิชา ICT12367 - Django Web Application</p>
    </div>
</div>

<div class="container">
    <div class="card p-4">
        <h2 class="text-center mb-4">📊 ข้อมูลประชากร</h2>
        <div class="text-end mb-3">
            <a href="/form/" class="btn btn-success">➕ เพิ่มข้อมูล</a>
        </div>

        <table class="table table-striped table-hover text-center">
            <thead class="table-dark">
                <tr>
                    <th>รหัสประชากร</th>
                    <th>ชื่อจริง</th>
                    <th>ชื่อเล่น</th>
                    <th>อายุ</th>
                    <th>จัดการ</th>
                </tr>
            </thead>
            <tbody>
                {% for i in data %}
                <tr>
                    <td>{{ i.citizen_id }}</td>
                    <td>{{ i.name }}</td>
                    <td>{{ i.nickname }}</td>
                    <td>{{ i.age }}</td>
                    <td>
                        <a href="javascript:void(0)" class="btn btn-warning btn-sm disabled" title="ฟังก์ชันนี้ยังไม่เปิดใช้งาน">
                            ✏️ แก้ไข
                        </a>
                        <a href="javascript:void(0)" class="btn btn-danger btn-sm disabled" title="ฟังก์ชันนี้ยังไม่เปิดใช้งาน">
                            🗑️ ลบ
                        </a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
