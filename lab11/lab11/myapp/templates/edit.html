<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<title>แก้ไขข้อมูล</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:linear-gradient(135deg,#667eea,#764ba2);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.box{
width:420px;
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

</style>

</head>

<body>

<div class="box">

<h3 class="text-center mb-3">✏️ แก้ไขข้อมูล</h3>

<form method="POST">
{% csrf_token %}

<div class="mb-3">
<label>รหัสประชากร</label>
<input type="text" name="citizen_id" value="{{person.citizen_id}}" class="form-control">
</div>

<div class="mb-3">
<label>ชื่อจริง</label>
<input type="text" name="name" value="{{person.name}}" class="form-control">
</div>

<div class="mb-3">
<label>ชื่อเล่น</label>
<input type="text" name="nickname" value="{{person.nickname}}" class="form-control">
</div>

<div class="mb-3">
<label>อายุ</label>
<input type="number" name="age" value="{{person.age}}" class="form-control">
</div>

<div class="d-grid">
<button class="btn btn-primary">💾 อัปเดตข้อมูล</button>
</div>

</form>

<div class="text-center mt-3">
<a href="/" class="btn btn-secondary">← กลับหน้าแรก</a>
</div>

</div>

</body>
</html>
