<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Person Table</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f5f7fa;
}

/* ปุ่ม Edit สีชมพู */
.btn-edit{
    background:#ff4da6;
    color:white;
}

/* ปุ่ม Delete สีส้ม */
.btn-delete{
    background:#ff8800;
    color:white;
}

/* จัดปุ่มกลาง */
.action-btns{
    text-align:center;
}

</style>

</head>

<body>

<div class="container mt-5">

<h2 class="text-center mb-4">Person List</h2>

<table class="table table-bordered table-hover">

<thead class="table-dark">
<tr>
<th>ID</th>
<th>Name</th>
<th>Age</th>
<th>Date</th>
<th class="text-center">Action</th>
</tr>
</thead>

<tbody>

{% for person in persons %}

<tr>
<td>{{ person.id }}</td>
<td>{{ person.name }}</td>
<td>{{ person.age }}</td>
<td>{{ person.date }}</td>

<td class="action-btns">

<a href="#" class="btn btn-edit btn-sm">
Edit
</a>

<a href="#" class="btn btn-delete btn-sm">
Delete
</a>

</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

</body>
</html>
